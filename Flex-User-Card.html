<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/Flex-User-Card.css" />
    <title>Flex-User-Card</title>
  </head>
  <body>
    <article class="userCard">
      <img
        class="userImg"
        src="./foto/istockphoto-2172317014-612x612.jpg"
        alt=""
      />
      <h1 class="cardTitle">AKINWUMI MICHAEL</h1>
      <h3 class="userPosition">Product Design Track</h3>
      <p class="userText">
        I choose product design because i love seeing beautiful interfaces and
        to be able to solve user’s problems.
      </p>
      <footer class="cardFooter">
        <h2 class="cardFooterTitle">Contact</h2>
          <ul class="socialsContainer">
            <li class="socialLinkItem">
              <i class="fa-brands fa-facebook-f"></i>
            </li>
            <li class="socialLinkItem">
              <i class="fa-brands fa-twitter"></i>
            </li>
            <li class="socialLinkItem">
              <i class="fa-brands fa-google"></i>
            </li>
            <li class="socialLinkItem">
              <i class="fa-brands fa-instagram"> </i>
            </li>
          </ul>
          <div class="footerButtonsContainer">
            <button class="footerButton bgBrown">Contact Me</button>
            <button class="footerButton bgOrange">Hire Me</button>
          </div>  
      </div>
      </footer>
    </article>
  </body>
</html>
